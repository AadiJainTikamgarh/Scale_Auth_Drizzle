version: "3.9"

services:
  app:
    build: .

    container_name: auth_app

    ports:
      - "3000:3000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: auth_postgres

    restart: always

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:8.4.0-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


volumes:
  redis_data:
  postgres_data: